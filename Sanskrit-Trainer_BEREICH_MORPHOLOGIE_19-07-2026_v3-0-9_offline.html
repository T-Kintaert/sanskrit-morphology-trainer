SANSKRIT-MORPHOLOGIETRAINER 1.0
Konzeption: Thomas Kintaert (Universität Wien)
Erstellungszeitraum: Jänner & Februar 2026

TECHNISCHE UMSETZUNG:
Diese Anwendung wurde im dialogischen Prozess mit Künstlicher Intelligenz
entwickelt. Die Programmierung wurde durch den Einsatz der Google-Gemini-
Modelle 3 (Flash und Pro, inkl. der Gemini-Funktion Canvas) ermöglicht.

IAST-SCHRIFTART:
Nutzung von Google Fonts (Noto Sans/Serif) für die korrekte Darstellung der
Diakritika. Hinweis: Beim Laden der Schriftarten wird technisch bedingt die
IP-Adresse an Google übertragen.

NUTZUNG & KOMPATIBILITÄT:
Diese App ist für die Verwendung am Desktop und auf mobilen Geräten optimiert.
Alle Daten werden lokal im Browser gespeichert.

WICHTIGER HINWEIS ZUR DATENSICHERHEIT:
Da die Speicherung lokal erfolgt, führt das Löschen von Website-Daten (inkl.
Cookies und lokalem Speicher) unwiderruflich zum DATENVERLUST. Wir empfehlen
dringend, Ihren Lernfortschritt regelmäßig zu sichern. Nutzen Sie hierfür
die Funktion „Alles exportieren“ auf der Übersichtsseite, um Ihre Daten als
JSON-Datei lokal zu archivieren.

LIZENZ:
Veröffentlicht unter CC BY-NC-SA 4.0.
Die App darf geteilt und verändert werden (Namensnennung, nicht-kommerziell,
Weitergabe unter gleichen Bedingungen).

        body { font-family: 'Noto Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .font-iast-sans { font-family: 'Noto Sans', sans-serif !important; }
        .font-iast-serif { font-family: 'Noto Serif', serif !important; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .popup-anim { animation: popup 0.2s ease-out; }
        @keyframes popup { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .no-select { user-select: none; }
        /* PDF-spezifische Stile */
        .pdf-page { display: none; padding: 25px; background: white; color: black; width: 630px; box-sizing: border-box; }
        .pdf-item { margin-bottom: 35px; page-break-inside: avoid; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .pdf-item:last-child { margin-bottom: 0; border-bottom: none; }
        .pdf-table { width: 99%; margin: 0 auto; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #ccc; padding: 6px 4px; text-align: center; font-size: calc(13px * var(--sanskrit-scale, 1)); word-wrap: break-word; }
        .pdf-table th { background-color: #f8f8f8; color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
        .pdf-header { margin-bottom: 15px; }
        .pdf-title { font-size: 20px; font-weight: bold; color: #0d9488; }
        .pdf-item .pdf-stem { font-size: calc(16px * var(--sanskrit-scale, 1)); color: #444; margin-top: 4px; }
        .pdf-notes { margin-top: 15px; padding: 10px; background: #fdfdfd; border-left: 3px solid #0d9488; font-size: 12px; color: #555; font-style: italic; white-space: pre-wrap; display: none; }
		.pdf-notes:not(:empty) { display: block; }
        /* Print-spezifische Stile für Browser-Druck */
        @media print {
            /* Die eigentliche App komplett für den Drucker entfernen */
            #root { display: none !important; }
            
            /* Das PDF-Element für den Drucker aktivieren */
            #print-section { 
                display: block !important;
